name: AI简报每日更新

on:
  schedule:
    # UTC时间23点 = 北京时间7点（冬）/ 北京时间8点（夏）
    - cron: '0 23 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install edge-tts beautifulsoup4

    - name: 显示环境信息
      run: |
        echo "Python版本: $(python --version)"
        echo "当前时间: $(date)"
        echo "时区: $(date +%Z)"

    - name: 运行更新脚本
      run: |
        python cloud-update.py
      env:
        GITHUB_ACTIONS: true
        GITHUB_WORKSPACE: ${{ github.workspace }}

    - name: 配置Git
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    - name: 提交更改
      run: |
        git add podcasts/
        git add ai-daily-brief.html
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 自动更新: $(date +'%Y-%m-%d')"

    - name: 推送更改
      run: |
        git push

    - name: 上传音频文件（可选）
      uses: actions/upload-artifact@v3
      with:
        name: podcast-audio
        path: podcasts/ai_brief_*.mp3
        retention-days: 30

    - name: 创建Release（可选）
      if: success()
      run: |
        TAG="v$(date +'%Y.%m.%d')"
        gh release create "$TAG" podcasts/ai_brief_*.mp3 --notes "AI简报 - $(date +'%Y年%m月%d日')" --title "AI简报 - $(date +'%Y-%m-%d')"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
